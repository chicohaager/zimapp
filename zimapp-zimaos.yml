# zimapp for ZimaOS — ready to install, nothing to build.
#
# The image comes from Docker Hub (amd64 + arm64), so no build step and no
# registry account are needed. Generated by zimapp itself.
#
# Proven on ZimaOS v1.7.0-beta1 on 2026-07-21, twice:
#   - as a second app (app id and port changed so it could stand beside the
#     running one): image pulled from Docker Hub, tile in the grid, icon
#     rendered from the raw.githubusercontent.com URL below (512x512, checked on
#     that tile and not on the one next to it), UI answering on its port.
#   - verbatim, as the file stands here, applied to the running installation
#     with `zimapp.py update zimapp --file zimapp-zimaos.yml --apply`. The
#     container came up on chicohaager/zimapp:2.0.0, /DATA/AppData/zimapp/
#     survived, and the app never left the grid.
#
# Install it with zimapp (from a checkout of this repository):
#
#     ZIMA_HOST=<your-zimaos> ZIMA_USER=<you> ZIMA_PASS='…' \
#         python3 zimapp.py install zimapp-zimaos.yml
#
# It is a plain compose file, so `docker compose -f zimapp-zimaos.yml up -d`
# works on any other machine as well — the x-casaos block is simply ignored there.
#
# ⚠️ There is no login yet. As written, the port is published on 0.0.0.0, which
# makes the whole API reachable for everyone on the LAN. On an untrusted network,
# change `published: '8790'` to a 127.0.0.1 binding and reach it over SSH or
# Tailscale. Installing on ZimaOS always needs your own ZimaOS credentials,
# which zimapp never stores.
#
# The bind mount is where "Save as blueprint" writes. Without it, saving is
# switched off and says so — the directory inside the image is read-only and
# gone at the next recreate. ZimaOS creates the directory on first install.
name: zimapp
services:
  app:
    image: chicohaager/zimapp:2.0.0
    environment:
    - ZIMAPP_BLUEPRINT_DIR=/blueprints
    - TZ=Europe/Berlin
    restart: unless-stopped
    ports:
    - mode: ingress
      target: 8790
      published: '8790'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/zimapp/blueprints
      target: /blueprints
    networks:
    - zimapp-network
    labels:
      icon: https://raw.githubusercontent.com/chicohaager/zimapp/main/static/icon.svg
    deploy:
      resources:
        limits:
          memory: 1GB
          cpus: '1.00'
    x-casaos:
      ports:
      - container: '8790'
        description:
          en_us: WebUI port (8790)
      volumes:
      - container: /blueprints
        description:
          en_us: Blueprints saved from the UI
networks:
  zimapp-network:
    driver: bridge
x-casaos:
  architectures:
  - amd64
  - arm64
  main: app
  author: chicohaager
  developer: chicohaager
  category: Developer
  icon: https://raw.githubusercontent.com/chicohaager/zimapp/main/static/icon.svg
  title:
    en_us: zimapp
    custom: zimapp
  tagline:
    en_us: compose URL to ZimaOS app
  description:
    en_us: 'Turns a URL to a docker-compose.yml into a ZimaOS-conformant app: builds the x-casaos block, validates against the known pitfalls and installs it through the official ZimaOS API.'
  index: /
  is_uncontrolled: false
  port_map: '8790'
