# Invoice Ninja 5 — invoicing, quotes, payments — as ONE ZimaOS app.
#
# Install: ZimaOS App Store → "Install a customized app" → Import this file
#          (or: python3 zimapp.py install invoiceninja.yml --host <ip> ...)
#
# ────────────────────────────────────────────────────────────────────────────
# CHANGE BEFORE YOU INSTALL — the first one WILL bite you if you skip it:
#
#   1. APP_URL   must be the address you type in the browser, including the
#                port. Invoice Ninja builds PDF links, e-mail links and the
#                client portal from it. Wrong value = the app looks fine and
#                hands out links nobody can open.
#   2. APP_KEY   the value below was generated for this file, so every copy of
#                this file shares it. Generate your own — it encrypts stored
#                credentials:
#                  docker run --rm invoiceninja/invoiceninja-debian \
#                    php artisan key:generate --show
#   3. IN_PASSWORD / DB passwords — same reasoning. IN_USER_EMAIL and
#                IN_PASSWORD create the FIRST admin account on first start and
#                are only read then; the account keeps whatever password you
#                set here (or change later in the UI).
#
# The stack is upstream's own layout from the maintained `debian` branch
# (https://github.com/invoiceninja/dockerfiles/tree/debian/debian):
# php-fpm app + nginx + mysql + redis. The upstream file cannot be used on
# ZimaOS as-is, and that is not a ZimaOS bug — it is what a compose meant for
# `git clone` looks like:
#
#   - `env_file: ./.env`  → ZimaOS never creates that file. All values are
#     inlined into `environment:` here.
#   - named volumes (`app_public`, `mysql_data`, …) → rewritten to binds under
#     /DATA/AppData/invoiceninja/, which is the only place that survives.
#   - `./nginx:/etc/nginx/conf.d:ro` → a bind to a directory of config FILES
#     from the git checkout. ZimaOS would create an empty directory there,
#     nginx would start without a single server block and answer nothing.
#     That is why the two upstream config files are written by the nginx
#     container itself on start (see the `command:` below) — it keeps this a
#     single self-contained file.
#   - `build:` on the app service → ZimaOS does not build images; the published
#     image invoiceninja/invoiceninja-debian is used instead.
#
# Verified on ZimaOS v1.7.0-beta1 (ZimaCube, amd64) — see the header of the
# repo README for what exactly was measured.

name: invoiceninja

services:
  # ── database ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=ninja
      - MYSQL_USER=ninja
      - MYSQL_PASSWORD=9bEQqzjDAHyPXJDETnJE0zxh
      - MYSQL_ROOT_PASSWORD=8pebPB8x7kIyARMlfkqGQbqF
    volumes:
      - type: bind
        source: /DATA/AppData/invoiceninja/mysql
        target: /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uninja", "-p9bEQqzjDAHyPXJDETnJE0zxh"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - invoiceninja-network

  # ── cache / queue / sessions ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/invoiceninja/redis
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - invoiceninja-network

  # ── Invoice Ninja itself (php-fpm + queue worker + scheduler) ─────────────
  app:
    image: invoiceninja/invoiceninja-debian:latest
    restart: unless-stopped
    environment:
      # 1. CHANGE THIS — host and port you actually browse to.
      - APP_URL=http://REPLACE-WITH-YOUR-ZIMAOS-IP:8012
      # 2. CHANGE THIS — see the header.
      - APP_KEY=base64:YJvro32quyjIYcyfMvqnirUS+g3nzkw6HtbpwwCaqZI=
      # APP_ENV=production is what makes the container run the migrations and
      # create the first account on start (upstream scripts/init.sh).
      - APP_ENV=production
      - APP_DEBUG=false
      - REQUIRE_HTTPS=false
      - TRUSTED_PROXIES=*
      - IS_DOCKER=true
      # First admin account — created ONCE, on the very first start.
      # 3. CHANGE THIS.
      - IN_USER_EMAIL=admin@example.com
      - IN_PASSWORD=K51wwYLRE0mLSDWR
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=ninja
      - DB_USERNAME=ninja
      - DB_PASSWORD=9bEQqzjDAHyPXJDETnJE0zxh
      # Redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      # PDF engine: snappdf uses the Chrome that ships inside this image.
      - PDF_GENERATOR=snappdf
      - PHANTOMJS_PDF_GENERATION=false
      - FILESYSTEM_DISK=debian_docker
      - SCOUT_DRIVER=null
      # Mail: "log" writes mails into the log instead of sending them. Point
      # this at your own SMTP server when you want Invoice Ninja to send.
      - MAIL_MAILER=log
      - MAIL_FROM_ADDRESS=user@example.com
      - MAIL_FROM_NAME=Self Hosted User
    volumes:
      # Shared with nginx: nginx serves these files, the app writes them.
      - type: bind
        source: /DATA/AppData/invoiceninja/public
        target: /var/www/html/public
      - type: bind
        source: /DATA/AppData/invoiceninja/storage
        target: /var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2GB
          cpus: "2.00"
    networks:
      - invoiceninja-network

  # ── webserver (the tile points here) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # Upstream keeps these two files in the repo and bind-mounts them. On
    # ZimaOS there is no repo next to the compose, so the container writes them
    # itself and then starts nginx. Contents are upstream's, verbatim
    # (debian/nginx/laravel.conf and debian/nginx/invoiceninja.conf).
    #
    # Why the nginx variables are written as @uri and translated by `tr` right
    # before nginx starts: a literal dollar sign does NOT survive here. ZimaOS
    # collapses the compose escape `$$` back to `$` when it stores the file,
    # and `docker compose` then reads that `$uri` as a variable of its own and
    # substitutes the empty string — measured on v1.7.0-beta1: nginx came up
    # with `try_files  / /index.php?;`. Doubling the escape would fix ZimaOS
    # and break plain `docker compose up`. A file without a single `$` in it
    # is correct on both paths, whatever the number of substitution passes.
    command:
      - /bin/sh
      - -c
      - |
        cat > /tmp/laravel.conf <<'NGINXCONF'
        server {
            listen 80 default_server;
            server_name _;
            root /var/www/html/public;

            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";

            index index.php;
            charset utf-8;

            location / {
                try_files @uri @uri/ /index.php?@query_string;
            }

            location = /favicon.ico { access_log off; log_not_found off; }
            location = /robots.txt  { access_log off; log_not_found off; }

            error_page 404 /index.php;

            location ~ \.php@ {
                fastcgi_pass app:9000;
                fastcgi_param SCRIPT_FILENAME @realpath_root@fastcgi_script_name;
                include fastcgi_params;
            }

            location ~ /\.(?!well-known).* {
                deny all;
            }
        }
        NGINXCONF
        cat > /etc/nginx/conf.d/invoiceninja.conf <<'NGINXCONF'
        client_max_body_size 10M;
        client_body_buffer_size 10M;
        server_tokens off;
        fastcgi_buffers 32 16K;
        gzip on;
        gzip_comp_level 2;
        gzip_min_length 1M;
        gzip_proxied any;
        gzip_types *;
        NGINXCONF
        tr '@' '\044' < /tmp/laravel.conf > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    ports:
      - mode: ingress
        target: 80
        published: "8012"
        protocol: tcp
    volumes:
      # Read-only: nginx only ever serves what the app produced.
      - type: bind
        source: /DATA/AppData/invoiceninja/public
        target: /var/www/html/public
        read_only: true
      - type: bind
        source: /DATA/AppData/invoiceninja/storage
        target: /var/www/html/storage
        read_only: true
    depends_on:
      app:
        condition: service_started
    networks:
      - invoiceninja-network
    labels:
      icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/invoice-ninja.png
    x-casaos:
      ports:
        - container: "80"
          description:
            en_us: WebUI port
      volumes:
        - container: /var/www/html/public
          description:
            en_us: Public files (logos, generated assets)
        - container: /var/www/html/storage
          description:
            en_us: Uploads, PDFs, backups and logs

networks:
  invoiceninja-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nginx
  author: Holgi
  developer: Invoice Ninja
  category: Finance
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/invoice-ninja.png
  title:
    en_us: Invoice Ninja
    custom: Invoice Ninja
  tagline:
    en_us: Invoices, quotes and payments, self-hosted
  description:
    en_us: >-
      Invoice Ninja 5 — invoicing, quotes, recurring billing, time tracking and
      online payments. MySQL and Redis are part of the same ZimaOS app; PDFs are
      rendered by the Chrome that ships inside the app image.
  index: /
  is_uncontrolled: false
  port_map: "8012"
